<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>RS3 Quest Helper — self tests</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<!-- Minimal DOM so app.js can initialise -->
	<div id="alt1-banner" class="banner hidden"><a id="addtoalt1" href="#"></a></div>
	<div id="view-home" class="view hidden">
		<input id="search" type="search">
		<div id="index-status" class="hidden"></div>
		<main id="quest-list"></main>
	</div>
	<div id="view-guide" class="view hidden">
		<button id="btn-home"></button>
		<div id="guide-title"></div>
		<div id="progress-fill"></div><span id="progress-label"></span>
		<div id="quest-info"></div>
		<details id="items-panel" class="hidden"><ul id="items-list"></ul></details>
		<div id="guide-status" class="hidden"></div>
		<main id="steps"></main>
		<div id="assist-status" class="hidden"></div>
		<button id="btn-back"></button><button id="btn-next"></button>
		<button id="btn-overlay"></button><button id="btn-assist"></button><button id="btn-reset"></button>
	</div>

	<pre id="results">running…</pre>

	<script src="libs/a1lib.js"></script>
	<script src="libs/ocr.js"></script>
	<script src="libs/dialog.js"></script>
	<script src="libs/chatbox.js"></script>
	<script src="libs/font_digits.js"></script>
	<script src="app.js"></script>
	<script>
	(function () {
		var out = [];
		var failures = 0;
		function check(name, cond) {
			out.push((cond ? "PASS" : "FAIL") + " " + name);
			if (!cond) failures++;
		}
		function names(arr) { return arr.map(function (o) { return o.text; }).join(","); }

		// Libraries loaded and expose the expected globals?
		check("A1lib global", typeof A1lib !== "undefined" && !!A1lib.captureHoldFullRs);
		check("digit font global", typeof Alt1Fonts !== "undefined" && !!Alt1Fonts.pixel_8px_digits);
		check("digit font is a FontDefinition", (function () {
			var f = Alt1Fonts.pixel_8px_digits;
			if (f && f.default) f = f.default;
			return !!(f && f.chars && typeof f.basey === "number" && typeof f.width === "number");
		})());
		check("OCR global", typeof OCR !== "undefined" && !!OCR.readLine);
		check("Dialog global", typeof Dialog !== "undefined" && !!Dialog.default);
		check("Chatbox global", typeof Chatbox !== "undefined" && !!Chatbox.default);
		check("Dialog instantiates", (function () {
			try { return !!new Dialog.default().read; } catch (e) { return false; }
		})());
		check("Chatbox instantiates", (function () {
			try { return !!new Chatbox.default().find; } catch (e) { return false; }
		})());

		// Option matcher.
		var m = window.__rs3qh.matchOptions;
		var opts = [
			{ text: "Talk about A Christmas Reunion." },
			{ text: "Can you sell me a rune platebody?" },
			{ text: "Nevermind." }
		];
		var r;

		r = m("1 Talk about 'A Christmas Reunion'.", opts);
		check("text match beats numbering", r.length === 1 && r[0] === opts[0]);

		r = m("2", opts);
		check("bare number picks 2nd option", r.length === 1 && r[0] === opts[1]);

		r = m("Any", opts);
		check("Any picks all", r.length === 3);

		r = m("1 Talk about 'A Christmas Reunion'. / Any", opts);
		check("specific match wins over Any", r.length === 1 && r[0] === opts[0]);

		// Text candidates that don't match this screen must stay silent —
		// they belong to another screen in the conversation chain.
		r = m("1 Buy some swords.", [{ text: "Completely different" }, { text: "Other" }]);
		check("no number fallback for text candidates (" + names(r) + ")", r.length === 0);

		r = m("1 Buy some swords. / Any", [{ text: "Completely different" }, { text: "Other" }]);
		check("Any still applies when nothing matches", r.length === 2);

		r = m("1 No, she liked the ring. / 2 What are we going to do?",
			[{ text: "It's come out perfectly." }, { text: "How does this look?" }, { text: "It's a complete disaster." }]);
		check("chained candidates on wrong screen -> no boxes (" + names(r) + ")", r.length === 0);

		r = m("Accept", [{ text: "Accept the quest." }, { text: "Decline." }]);
		check("substring match", r.length === 1 && r[0].text === "Accept the quest.");

		r = m("9 Nope", [{ text: "One" }]);
		check("out-of-range number, no text match -> empty (" + names(r) + ")", r.length === 0);

		// OCR dropped a word: 4 of 5 meaningful words still present.
		r = m("1 Your daughter seeks permission to court an outlander.",
			[{ text: "Your daughter seeks permission to court an outlandr" }, { text: "No." }]);
		check("fuzzy word-overlap survives OCR errors", r.length === 1 && r[0].text.indexOf("daughter") !== -1);

		r = m("1 I'm sure that's not true.", [{ text: "I'm sure thats not true." }, { text: "Other." }]);
		check("punctuation-insensitive match", r.length === 1);

		// OCR text normalisation is case/punct insensitive.
		r = m("1 TALK ABOUT a christmas reunion", opts);
		check("case insensitive", r.length === 1 && r[0] === opts[0]);

		// Conversation tracker (evidence-based auto-tick).
		var co = window.__rs3qh.convoObserve;
		function ev(k, sub) { return { key: k, subIndex: sub === undefined ? null : sub }; }
		var advanced, res;
		// no dialog ever -> nothing happens
		advanced = false;
		for (var i = 0; i < 10; i++) { if (co("s1", false, null)) advanced = true; }
		check("convo: no dialog, nothing", !advanced);

		// THE EAVESDROP BUG: a conversation runs and ends but the step's
		// options never matched -> must NOT tick (returns none marker).
		co("s2", true, null); co("s2", true, null); co("s2", true, null);
		co("s2", false, null); co("s2", false, null);
		res = co("s2", false, null);
		check("convo: unmatched conversation does not tick", !!res && res.none === true);

		// Matched conversation ticks the step on the 3rd gone tick.
		co("s3", true, null); co("s3", true, ev("s3")); co("s3", true, null);
		co("s3", false, null); co("s3", false, null);
		res = co("s3", false, null);
		check("convo: matched conversation ticks step", !!res && !res.none && res.subIndex === null);
		check("convo: does not re-tick", co("s3", false, null) === null);

		// Sub-step evidence ticks the sub-step.
		co("s4", true, ev("s4", 2)); co("s4", true, ev("s4", 2));
		co("s4", false, null); co("s4", false, null);
		res = co("s4", false, null);
		check("convo: sub-step evidence", !!res && res.subIndex === 2);

		// Evidence from a previous step never leaks into the next.
		co("s5", true, ev("s5")); co("s5", true, ev("s5"));
		co("s6", true, null); co("s6", true, null);
		co("s6", false, null); co("s6", false, null);
		res = co("s6", false, null);
		check("convo: evidence does not leak across steps", !!res && res.none === true);

		// requiredConversations: needs multiple talks ONLY when a step
		// enumerates one screen's options 1..N (Soul Searching). Sequential
		// or repeated numbers are one conversation (Ellaron / Sedridor).
		var rc = window.__rs3qh.requiredConversations;
		check("reqconv: Soul Searching 1..3 -> 3", rc("1 Convince / 2 Persuade. / 3 Threaten.") === 3);
		check("reqconv: Ellaron 2/3/3/3/2 -> 1 (one conversation)",
			rc("2 How can I get into the old tower? / 3 You do know, though? / 3 You mean the rumour about Water Surge? / 3 What do you mean, the key lies in understanding Water Surge? / 2 It's such a pity you couldn't help me, Maybe I'll visit the library.") === 1);
		check("reqconv: Sedridor 3/3/4 -> 1", rc("3 Ariane says the tower is in danger. / 3 What are you going to do? / 4 Goodbye.") === 1);
		check("reqconv: single candidate -> 1", rc("1 Yes.") === 1);
		check("reqconv: with Any -> 1", rc("1 Talk about the quest. / Any") === 1);
		check("reqconv: offset numbers 2/3 -> 1", rc("2 Ask about X. / 3 Ask about Y.") === 1);

		// SOUL SEARCHING PATTERN: three separate conversations required
		// before the step ticks (required=3 from requiredConversations).
		var ssOpts = [{ text: "Convince" }, { text: "Persuade." }, { text: "Threaten." }];
		var cmc = window.__rs3qh.countMatchedCandidates("1 Convince / 2 Persuade. / 3 Threaten.", ssOpts);
		check("multi: three candidates on one screen", cmc === 3);
		function convoCycle(k, count) {
			co(k, true, ev(k), count); co(k, true, ev(k), count);
			co(k, false, null, 0); co(k, false, null, 0);
			return co(k, false, null, 0);
		}
		res = convoCycle("m1", 3);
		check("multi: first conversation is partial 1/3", !!res && res.partial === 1 && res.required === 3);
		res = convoCycle("m1", 3);
		check("multi: second is partial 2/3", !!res && res.partial === 2);
		res = convoCycle("m1", 3);
		check("multi: third ticks the step", !!res && !res.partial && !res.none && res.subIndex === null);

		// Ordinary chained candidates (different screens) still tick after
		// one conversation: only one candidate matches at a time.
		res = convoCycle("m2", 1);
		check("multi: single-match steps tick on first conversation", !!res && !res.partial && !res.none);

		// ELLARON REGRESSION: a single long conversation walks several
		// option-screens (one of them a topic menu that shows two guide
		// options at once). With required computed from the guide text (=1),
		// it must tick when that ONE conversation ends — not stay partial.
		var ellChat = "2 How can I get into the old tower? / 3 You do know, though? / 3 You mean the rumour about Water Surge? / 3 What do you mean, the key lies in understanding Water Surge? / 2 It's such a pity you couldn't help me, Maybe I'll visit the library.";
		var ellReq = rc(ellChat); // = 1
		// dialog stays open across many screens (seen keeps rising),
		// then the conversation ends (>=3 gone).
		for (var s = 0; s < 8; s++) co("ell", true, ev("ell"), ellReq);
		co("ell", false, null, ellReq); co("ell", false, null, ellReq);
		res = co("ell", false, null, ellReq);
		check("ellaron: one conversation ticks the step", !!res && !res.partial && !res.none && res.subIndex === null);

		// Single-tick blip -> no end signal at all.
		co("s7", true, ev("s7"));
		advanced = false;
		for (var i = 0; i < 5; i++) { if (co("s7", false, null)) advanced = true; }
		check("convo: single blip, nothing", !advanced);

		// Dialog reappearing resets the gone counter.
		co("s8", true, ev("s8")); co("s8", true, null);
		co("s8", false, null); co("s8", false, null);
		co("s8", true, null);
		check("convo: reappear resets gone", co("s8", false, null) === null && co("s8", false, null) === null);

		// Quest-name normalisation (RuneMetrics <-> wiki title matching).
		var nn = window.__rs3qh.normName;
		check("norm: miniquest suffix", nn("Doric's Task I (miniquest)") === nn("Doric's Task I"));
		check("norm: punctuation", nn("Another Slice of H.A.M.") === nn("Another Slice of HAM"));
		check("norm: ampersand", nn("Heroes & Villains") === nn("Heroes and Villains"));
		check("norm: case/spaces", nn("The  Blood Pact") === nn("the blood pact"));
		check("norm: distinct quests stay distinct", nn("A Fairy Tale I - Growing Pains") !== nn("A Fairy Tale II - Cure a Queen"));
		check("norm: (quest) disambiguator stripped", nn("Tears of Guthix (quest)") === nn("Tears of Guthix"));
		check("norm: (miniquest) disambiguator stripped", nn("Enter the Abyss (miniquest)") === nn("Enter the Abyss"));

		// RuneMetrics payload parsing (fetch and manual import share this).
		var rm = window.__rs3qh.parseRmPayload;
		var st = rm('{"quests":[{"title":"Cook\'s Assistant","status":"COMPLETED"},{"title":"Dragon Slayer","status":"STARTED"}]}');
		check("rm: parses statuses", !!st && st[nn("Cook's Assistant")] === "COMPLETED" && st[nn("Dragon Slayer")] === "STARTED");
		check("rm: rejects html", rm("<html>error page</html>") === null);
		check("rm: rejects empty quests", rm('{"quests":[]}') === null);
		check("rm: rejects other json", rm('{"error":"NO_PROFILE"}') === null);
		var wrapped = rm('Title: quests\nURL: x\n\n{"quests":[{"title":"Demon Slayer","status":"COMPLETED"}]} trailing');
		check("rm: unwraps proxy-wrapped payload", !!wrapped && wrapped[nn("Demon Slayer")] === "COMPLETED");

		// Live end-to-end: fetch real statuses through the fallback chain.
		window.__rs3qh.fetchRuneMetrics("Kiddsh_GIM", true, function (statuses) {
			var n = Object.keys(statuses).length;
			document.getElementById("results").textContent +=
				"\nLIVE rm sync OK: " + n + " quests" + (statuses[nn("Cook's Assistant")] === "COMPLETED" ? " (Cook's Assistant COMPLETED)" : "");
		}, function (msg) {
			document.getElementById("results").textContent += "\nLIVE rm sync FAILED: " + msg;
		});

		// Floor numbering: the wiki's {{FloorNumber|n}} parameter is the US
		// convention; UK counts the ground floor separately.
		var fl = window.__rs3qh.floorText;
		check("floors: uk ground", fl(1, "uk") === "ground floor");
		check("floors: uk 1st", fl(2, "uk") === "1st floor");
		check("floors: uk 2nd", fl(3, "uk") === "2nd floor");
		check("floors: us keeps number", fl(2, "us") === "2nd floor" && fl(1, "us") === "1st floor");
		check("floors: basement", fl(0, "uk") === "basement" && fl(0, "us") === "basement");
		check("floors: non-numeric passthrough", fl("?", "uk") === "floor ?");
		var flp = window.__rs3qh.floorPrefForLocale;
		check("floors: en-US locale defaults US", flp("en-US") === "us" && flp("en-ca") === "us");
		check("floors: other locales default UK", flp("en-GB") === "uk" && flp("nl-NL") === "uk" && flp("") === "uk");
		window.__rs3qh.setFloorPref("uk");
		var gFloor = window.__rs3qh.parseQuickGuide("==S==\n{{Checklist|\n* Go to the {{FloorNumber|2}} and look around.\n}}\n");
		check("floors: guide renders uk by default", gFloor.sections[0].steps[0].text === "Go to the 1st floor and look around.");
		window.__rs3qh.setFloorPref("us");
		var gFloor2 = window.__rs3qh.parseQuickGuide("==S==\n{{Checklist|\n* Go to the {{FloorNumber|2}} and look around.\n}}\n");
		check("floors: guide renders us when configured", gFloor2.sections[0].steps[0].text === "Go to the 2nd floor and look around.");
		window.__rs3qh.setFloorPref("uk");

		// Bare-number chains ("1 / 1 / 1 / 4") are successive screens of one
		// conversation: with a screen index, only that screen's number is
		// highlighted; and they never raise the conversations-required count.
		var chainOpts = [{ text: "Alpha" }, { text: "Beta" }, { text: "Gamma" }, { text: "Delta" }];
		var mo = window.__rs3qh.matchOptions;
		check("number chain: screen 0 -> option 1", mo("1 / 1 / 1 / 4", chainOpts, 0).length === 1 && mo("1 / 1 / 1 / 4", chainOpts, 0)[0] === chainOpts[0]);
		check("number chain: screen 2 -> option 1", mo("1 / 1 / 1 / 4", chainOpts, 2)[0] === chainOpts[0]);
		check("number chain: screen 3 -> option 4", mo("1 / 1 / 1 / 4", chainOpts, 3)[0] === chainOpts[3]);
		check("number chain: extra screens clamp to last", mo("1 / 1 / 1 / 4", chainOpts, 9)[0] === chainOpts[3]);
		check("number chain: out-of-range number -> no boxes", mo("1 / 6", [{ text: "A" }, { text: "B" }], 1).length === 0);
		check("number chain: sequential chain shows only the next pick", mo("1 / 1 / 1 / 4", chainOpts).length === 1);
		check("number chain: text candidates unaffected by index",
			mo("1 Convince them. / 2 Persuade. / 3 Threaten.", [{ text: "Convince them." }, { text: "Persuade." }, { text: "Threaten." }], 0).length === 3);
		check("number chain: never counts toward required conversations",
			window.__rs3qh.countMatchedCandidates("1 / 1 / 1 / 4", chainOpts) === 0);

		// Keybind tokens: single letters case-fold, named keys stay verbatim,
		// labels are human-readable.
		var nk = window.__rs3qh.normKeybind, kl = window.__rs3qh.keyLabel;
		check("keybind: letter lower-cases", nk("N") === "n" && nk("q") === "q");
		check("keybind: named key verbatim", nk("Enter") === "Enter" && nk("ArrowRight") === "ArrowRight");
		check("keybind: label upper-cases letter", kl("n") === "N");
		check("keybind: label names space/arrow", kl(" ") === "Space" && kl("ArrowRight") === "→");
		check("keybind: N and n match same binding", nk("N") === nk("n"));

		// Dialogue targets: sub-steps outrank the parent, so a conversation
		// matching a sub ticks the sub — the parent (often ending in "Any")
		// can no longer claim every conversation and sweep subs done.
		var tgtStep = {
			text: "Talk to Gertrude.", chat: "3 Talk about the quest. / Any",
			subs: [{ text: "Hellcat variant", chat: "4 Talk about the quest." }, { text: "no chat sub" }]
		};
		var tgts = window.__rs3qh.assistTargets(tgtStep, function () { return false; });
		check("targets: sub before parent", tgts.length === 2 && tgts[0].subIndex === 0 && tgts[1].subIndex === null);
		check("targets: done subs excluded",
			window.__rs3qh.assistTargets(tgtStep, function () { return true; })[0].subIndex === null);
		check("targets: chatless subs never targeted",
			tgts.every(function (t) { return t.label !== "no chat sub"; }));

		// Auto-tick blocks only on unticked sub-steps that have their own
		// dialogue; a chatless informational note never blocks completion
		// (Rune Mysteries rune-guardian step).
		var atb = window.__rs3qh.autoTickBlockedBySubs;
		var noneDone = function () { return false; };
		check("autotick: chat sub blocks", atb({ subs: [{ text: "x", chat: "4 Yes." }] }, noneDone) === true);
		check("autotick: chatless note does not block",
			atb({ subs: [{ text: "The options you pick only dictate the title." }] }, noneDone) === false);
		check("autotick: mixed, chat sub ticked -> not blocked",
			atb({ subs: [{ text: "x", chat: "4 Yes." }, { text: "note" }] }, function (k) { return k === 0; }) === false);
		check("autotick: no subs -> not blocked", atb({ text: "plain" }, noneDone) === false);

		// "Every option matched" (the Any fallback) draws no boxes — words in
		// the status line instead of a wall of green (Reddit report).
		var aom = window.__rs3qh.allOptionsMatched;
		var fourOpts = [{ text: "a" }, { text: "b" }, { text: "c" }, { text: "d" }];
		check("any-fallback: all matched -> no boxes", aom(fourOpts.slice(), fourOpts) === true);
		check("any-fallback: partial match -> boxes stay", aom(fourOpts.slice(0, 1), fourOpts) === false);
		check("any-fallback: single-option screens still box", aom([{ text: "only" }], [{ text: "only" }]) === false);
		check("any-fallback: matcher still returns all for evidence",
			window.__rs3qh.matchOptions("1 No such text here / Any", fourOpts, 0).length === 4);

		// Sequential chain, two candidates on ONE screen: only the earliest
		// (next-to-pick) is highlighted (Rune Mysteries Ariane: pick "We
		// should keep our minds on the job" now, "Yes, it's inspiring" later).
		var arOpts = [{ text: "Yes, it's inspiring." }, { text: "We should keep our minds on the job." }, { text: "Is there anything valuable we can loot?" }];
		var arChat = "2 We should keep our minds on the job. / 1 Yes, it's inspiring. / 2 Okay, what should we do now?";
		var ar = window.__rs3qh.matchOptions(arChat, arOpts, 0);
		check("chain: only the next-to-pick option boxed", ar.length === 1 && ar[0] === arOpts[1]);
		// The later screen (after picking) shows "Yes, it's inspiring" -> it
		// becomes the earliest match and is highlighted then.
		var arOpts2 = [{ text: "Yes, it's inspiring." }, { text: "Something else." }];
		check("chain: later screen highlights the next candidate",
			window.__rs3qh.matchOptions(arChat, arOpts2, 1)[0] === arOpts2[0]);
		// Enumerated 1..N (Soul Searching) still highlights every option.
		check("chain: enumerated step still shows all",
			window.__rs3qh.matchOptions("1 Convince / 2 Persuade. / 3 Threaten.", [{ text: "Convince" }, { text: "Persuade." }, { text: "Threaten." }], 0).length === 3);

		// Chain candidates carry their own screen's option number: a text
		// match at a different position belongs to a later screen and stays
		// silent (Rune Mysteries: "4 Goodbye." must not box Goodbye at #5,
		// and "3 Ariane says..." must not fuzzy-claim option 2 off filler
		// words like "the"/"ariane"/"tower").
		var sedridorOpts = [
			{ text: "Don't you believe her?" },
			{ text: "Why won't you let Ariane into the tower?" },
			{ text: "What are you going to do?" },
			{ text: "Other questions…" },
			{ text: "Goodbye." }
		];
		var sedChat = "3 Ariane says the tower is in danger. / 3 What are you going to do? / 4 Goodbye.";
		var sed = window.__rs3qh.matchOptions(sedChat, sedridorOpts, 1);
		check("chain: only the current screen's option boxed", sed.length === 1 && sed[0] === sedridorOpts[2]);
		check("chain: number-position agreement required",
			window.__rs3qh.matchOptions("4 Goodbye.", sedridorOpts, 0).length === 0 &&
			window.__rs3qh.matchOptions("5 Goodbye.", sedridorOpts, 0)[0] === sedridorOpts[4]);
		check("chain: stopwords don't fuzzy-claim similar options",
			window.__rs3qh.matchOptions("Ariane says the tower is in danger.", sedridorOpts, 0).length === 0);
		check("chain: remnants don't inflate required conversations",
			window.__rs3qh.countMatchedCandidates(sedChat, sedridorOpts) === 1);

		// A text candidate names ONE option: only the best-scoring match is
		// boxed, so near-misses sharing common words don't light up too
		// (Carnillean Rising: "Can you help me?" must not also box
		// "Can you go away?").
		var goblinOpts = [
			{ text: "Tell me about the old woman who came in earlier." },
			{ text: "Can you go away?" },
			{ text: "Can you help me?" },
			{ text: "Excuse me now." }
		];
		var gm = window.__rs3qh.matchOptions("3 Can you help me? / 3 Here, you can have this armour. / 1 Patrolling guards", goblinOpts, 0);
		check("best match: exactly one box on the goblin screen", gm.length === 1);
		check("best match: it is \"Can you help me?\"", gm[0] === goblinOpts[2]);
		check("best match: exact text beats token overlap",
			window.__rs3qh.matchOptions("2 Can you go away?", goblinOpts, 0)[0] === goblinOpts[1]);

		// <imagemap> nav maps (The Fremennik Trials): keep the map image,
		// drop the coordinate rects — no filename/number leak into text.
		var gMap = window.__rs3qh.parseQuickGuide(
			"==S==\n<imagemap>\nFile:The Fremennik Trials map.png|centre\ndesc none\nrect 122 19 263 37 [[The Fremennik Isles]]\nrect 6 385 165 402 [[Brundt]]\n</imagemap>\n{{Checklist|\n* Talk to Brundt.\n}}\n"
		);
		var mapImgs = [];
		gMap.sections[0].steps.forEach(function (s) { (s.images || []).forEach(function (im) { mapImgs.push(im); }); });
		gMap.sections[0].images.forEach(function (im) { mapImgs.push(im); });
		check("imagemap: map image extracted", mapImgs.some(function (im) { return im.file === "The Fremennik Trials map.png"; }));
		check("imagemap: no filename/coords leak into text",
			gMap.sections[0].steps.every(function (s) { return !/\.png|rect |\d\d\d/.test(s.text + " " + (s.note || "")); }));

		// <gallery> images (Heart of Stone) become step images instead of
		// leaking "file.png|caption" text into the step.
		var gGal = window.__rs3qh.parseQuickGuide(
			"==S==\n{{Checklist|\n* Talk to Kipple and note the location he tells you. {{Chat option|1 Yes.}}\n}}\n" +
			"<gallery mode=\"packed\" heights=\"250\">\nHeart of Stone - Wizards' Tower solution.png|Wizards' Tower solution\n</gallery>\n"
		);
		var galImgs = [];
		gGal.sections[0].steps.forEach(function (s) { (s.images || []).forEach(function (im) { galImgs.push(im); }); });
		check("gallery: image extracted", galImgs.length === 1 && galImgs[0].file === "Heart of Stone - Wizards' Tower solution.png");
		check("gallery: caption kept", galImgs[0].caption === "Wizards' Tower solution");
		check("gallery: no filename leaks into text/notes",
			gGal.sections[0].steps.every(function (s) {
				return (s.text + " " + (s.note || "")).indexOf(".png") === -1;
			}));

		// Efficient Ironman Pathway: steps come from static-row-header-step
		// table rows (Activity | Notes | Level); other tables and the
		// Miniguides half are skipped.
		var pw = window.__rs3qh.parsePathwayGuide(
			"=Main guide=\n==Part 1: Starting off==\nIntro prose here.\n" +
			"{| class=\"wikitable lighttable\"\n! Order !! Task\n|-\n|1\n|[[Nemi Forest]]\n|}\n" +
			"{|class=\"wikitable static-row-numbers static-row-header-step \" data-tableid=\"EIP1\"\n" +
			"! style=\"width:45%;\" | Activity !! Notes !! Level\n" +
			"|- data-rowid = \"Tutorial Island\"\n| Skip Tutorial Island \n| {{NA}}\n| {{NA}}\n" +
			"|-\n| Complete [[Cook's Assistant]] {{Chat options|1 Yes.}}\n| Save an [[unfired bowl]]\n| 10 [[Cooking]]\n|}\n" +
			"{|class=\"wikitable static-row-header-step\"\n! Activity !! Notes !! Level\n" +
			"|- data-rowid = \"The Blood Pact\"\n| {{QuestIcon|The Blood Pact}} <sup>([[The Blood Pact/Quick guide|Quick Guide]])</sup>\n| Keep [[Caitlin's staff]].\n|\n* {{sc|Prayer}} 3\n|}\n" +
			"==Part 2: Combat==\n{|class=\"wikitable static-row-header-step\"\n! A !! N !! L\n|-\n| Another step\n|\n|\n|}\n" +
			"\n= Miniguides =\n==Dailies==\n{|class=\"wikitable static-row-header-step\"\n|-\n| Should not appear\n|\n|\n|}\n"
		);
		check("pathway: two sections, miniguides cut", pw.sections.length === 2 && pw.sections[1].steps.length === 1);
		check("pathway: non-step table skipped", pw.sections[0].steps.length === 3);
		check("pathway: plain row", pw.sections[0].steps[0].text === "Skip Tutorial Island" && !pw.sections[0].steps[0].note);
		var pws = pw.sections[0].steps[1];
		check("pathway: activity text + chat", pws.text === "Complete Cook's Assistant" && pws.chat === "1 Yes.");
		check("pathway: links from activity and notes",
			pws.links.some(function (l) { return l.page === "Cook's Assistant"; }) &&
			pws.links.some(function (l) { return l.page === "unfired bowl"; }));
		check("pathway: note keeps notes + level", pws.note === "Save an unfired bowl [Level: 10 Cooking]");
		var pwq = pw.sections[0].steps[2];
		check("pathway: QuestIcon row keeps the quest name", pwq.text === "The Blood Pact (Quick Guide)");
		check("pathway: quest name is a clickable link",
			pwq.links.some(function (l) { return l.page === "The Blood Pact"; }));
		check("pathway: sc skill template renders in level", pwq.note === "Keep Caitlin's staff. [Level: Prayer 3]");

		// Live: the real pathway page parses into hundreds of steps.
		fetch("https://runescape.wiki/api.php?action=parse&page=Ironman_Mode%2FGuide%2FEfficient_Ironman_Pathway_Guide&prop=wikitext&format=json&origin=*")
			.then(function (r) { return r.json(); })
			.then(function (d) {
				var g = window.__rs3qh.parsePathwayGuide(d.parse.wikitext["*"]);
				var n = 0;
				g.sections.forEach(function (s) { n += s.steps.length; });
				document.getElementById("results").textContent +=
					"\nLIVE pathway OK: " + g.sections.length + " sections, " + n + " steps" +
					(n < 250 ? " (WARNING: fewer than expected)" : "");
			})
			.catch(function (e) {
				document.getElementById("results").textContent += "\nLIVE pathway FAILED: " + e.message;
			});

		// Full-guide image enrichment: pull captioned step screenshots from a
		// full walkthrough, drop chatheads/portraits, group by section.
		var fg = window.__rs3qh.parseFullGuideImages(
			"==Meeting Saradomin==\n[[File:Sir Owen chathead.png|60px]]\n[[File:Start.png|thumb|Saradomin informs you of your mission.]]\n" +
			"==The crypt==\n[[File:Puzzle icon.png|right]]\n[[File:Tile solution.png|thumb|right|The solution to the puzzle]]\n[[File:Fern.png|Fern using her special attack.]]\n"
		);
		check("fullimg: chathead dropped", !fg.meetingsaradomin || fg.meetingsaradomin.every(function (i) { return i.file.indexOf("chathead") === -1; }));
		check("fullimg: captioned screenshot kept", fg.meetingsaradomin && fg.meetingsaradomin[0].file === "Start.png" && /informs you/.test(fg.meetingsaradomin[0].caption));
		check("fullimg: icon + size-only dropped, real ones kept", fg.thecrypt && fg.thecrypt.length === 2);
		check("fullimg: grouped by normalised heading", !!fg.thecrypt && !!fg.meetingsaradomin);

		// Caption-to-step pinning: only a solid word overlap pins an image to
		// a step; weak matches fall back to section level (-1).
		var bsc = window.__rs3qh.bestStepForCaption;
		var capSteps = [{ text: "Talk to Sir Owen in the courtyard." }, { text: "Solve the tile puzzle on the floor." }, { text: "Fight Fern near the altar." }];
		check("caption pin: strong match pins to step", bsc("The solution to the tile puzzle", capSteps) === 1);
		check("caption pin: weak/one-word match -> section (-1)", bsc("A dramatic cutscene plays", capSteps) === -1);
		check("caption pin: short caption -> section (-1)", bsc("Overview", capSteps) === -1);
		// A single DISTINCTIVE word (long, in <=2 steps) pins — the Rune
		// Mysteries organ interface image, caption shares only "organ".
		var organSteps = [
			{ text: "Play the organ at the southern end of the ground floor." },
			{ text: "Press the organ keys in the following order." },
			{ text: "Take the organ key." }
		];
		check("caption pin: single distinctive word pins (organ x3)", bsc("The organ interface", organSteps) >= 0);
		// Real Rune Mysteries has "organ" in four steps — still pins.
		var organ4 = organSteps.concat([{ text: "Head back to the organ and play any note." }]);
		check("caption pin: distinctive word in four steps still pins", bsc("The organ interface", organ4) >= 0);
		// A common SHORT single word (talk, 4 letters) must NOT pin.
		var talkSteps = [{ text: "Talk to the wizard." }, { text: "Talk to the guard." }, { text: "Talk to the mage." }];
		check("caption pin: common short word stays section", bsc("Talk about the weather", talkSteps) === -1);
		// "organ" in >4 steps is no longer distinctive -> section.
		var manyOrgan = organ4.concat([{ text: "Repair the organ bellows." }]);
		check("caption pin: word in >4 steps not distinctive", bsc("The organ interface", manyOrgan) === -1);
		// A common 5+ letter filler ("around") must never pin on its own.
		check("caption pin: long filler word does not pin",
			bsc("Look around carefully", [{ text: "Walk around the tower." }, { text: "Look around here." }]) === -1);

		// Timeline order: tables in document order, first-cell links ranked,
		// header rows and duplicates skipped.
		var tl = window.__rs3qh.parseTimelineOrder(
			'<div><table class="wikitable"><tr><th>Name</th><th>QP</th></tr>' +
			'<tr><td><a href="/w/Cook%27s_Assistant" title="Cook\'s Assistant">Cook\'s Assistant</a></td><td>1</td></tr>' +
			'<tr><td><a href="/w/Demon_Slayer" title="Demon Slayer">Demon Slayer</a></td><td>3</td></tr></table>' +
			'<table class="wikitable"><tr><th>Name</th></tr>' +
			'<tr><td><a href="/w/Ritual_of_the_Mahjarrat" title="Ritual of the Mahjarrat">Ritual of the Mahjarrat</a></td></tr>' +
			'<tr><td><a href="/w/Demon_Slayer" title="Demon Slayer">Demon Slayer</a></td></tr></table></div>'
		);
		check("timeline: ranks across tables in order",
			!!tl && tl[nn("Cook's Assistant")] === 0 && tl[nn("Demon Slayer")] === 1 && tl[nn("Ritual of the Mahjarrat")] === 2);
		check("timeline: duplicate keeps first rank", Object.keys(tl).length === 3);
		check("timeline: no tables -> null", window.__rs3qh.parseTimelineOrder("<p>nothing</p>") === null);

		// Live end-to-end: the combined quests+miniquests timeline parses
		// into a big ranking that includes miniquests.
		window.__rs3qh.fetchTimelineOrder(function (rank) {
			var n = Object.keys(rank).length;
			var notes = [];
			notes.push(rank[nn("Cook's Assistant")] === 0 ? "Cook's Assistant #1" : "WARNING: Cook's Assistant not first");
			notes.push(rank[nn("Sheep Shearer (miniquest)")] !== undefined ? "miniquests included" : "WARNING: miniquests missing");
			if (n < 300) notes.push("WARNING: only " + n + " entries");
			document.getElementById("results").textContent +=
				"\nLIVE timeline OK: " + n + " entries (" + notes.join("; ") + ")";
		}, function (msg) {
			document.getElementById("results").textContent += "\nLIVE timeline FAILED: " + msg;
		});

		// Item info: recipe and shop-table parsing.
		var rec = window.__rs3qh.parseRecipe(
			"{{Infobox Recipe\n|skill1 = Herblore\n|skill1lvl = 5\n|mat1 = Marrentill potion (unf)\n|mat2 = Unicorn horn dust\n|mat2quantity = 1\n|output1 = Antipoison (3)\n}}"
		);
		check("recipe: materials", !!rec && rec.mats.length === 2 && rec.mats[0] === "1× Marrentill potion (unf)");
		check("recipe: skill+level", rec.skill === "Herblore" && rec.level === "5");
		check("recipe: absent -> null", window.__rs3qh.parseRecipe("nothing here") === null);

		var shops = window.__rs3qh.parseShopRows(
			"<div><table><tr><th>Seller</th><th>Location</th><th>Stock</th><th>Sold at</th><th>Bought at</th><th>Members</th></tr>" +
			"<tr><td><a title=\"Obli's General Store\">Obli</a></td><td>Shilo Village</td><td>10</td><td>45 coins</td><td>20</td><td>Members-only</td></tr>" +
			"<tr><td>Karamja General Store</td><td>Musa Point</td><td>10</td><td>45 coins</td><td>20</td><td>F2P</td></tr></table></div>"
		);
		check("shops: rows parsed", shops.length === 2 && shops[0].text === "Obli — Shilo Village — 45 coins (members)");
		check("shops: shop page captured", shops[0].page === "Obli's General Store" && shops[1].page === null);
		check("shops: f2p has no members suffix", shops[1].text.indexOf("members") === -1);

		var lock = window.__rs3qh.questLockNote(
			"The Spice is Right is a shop in Sophanem. It can only be accessed after starting Icthlarin's Little Helper. It sells spices."
		);
		check("shop lock: quest sentence found", !!lock && lock.indexOf("Icthlarin") !== -1);
		check("shop lock: none for plain shops", window.__rs3qh.questLockNote("A nice shop in Varrock. It sells swords.") === null);
		check("shop lock: build sentence found", /Town Hall/.test(window.__rs3qh.questLockNote("The shop opens once the Town Hall has been built at the camp.") || ""));

		var lln = window.__rs3qh.locationLockNote;
		check("location lock: Anachronia buildable", /constructed/.test(lln("Anachronia") || ""));
		check("location lock: Prifddinas quest", /Plague's End/.test(lln("Prifddinas") || ""));
		check("location lock: Varrock is free", lln("Varrock") === null);

		var shopRows2 = window.__rs3qh.parseShopRows(
			"<div><table><tr><th>Seller</th><th>Location</th><th>Stock</th><th>Sold</th><th>Bought</th><th>Members</th></tr>" +
			"<tr><td><a title=\"Survival Shop\">Assistant</a></td><td>Anachronia</td><td>10</td><td>288 coins</td><td>86</td><td>Members</td></tr></table></div>"
		);
		check("shop rows: location lock attached", /constructed/.test(shopRows2[0].lock || ""));

		// Overlay card renders with content (non-empty pixels, sane size).
		var card = window.__rs3qh.testOverlayCard();
		var painted = 0;
		for (var ci = 3; ci < card.data.length; ci += 4) { if (card.data[ci] > 0) painted++; }
		check("overlay card: sane size", card.width === 440 && card.height > 60 && card.height < 220);
		check("overlay card: painted pixels", painted > card.width * card.height * 0.5);
		// Visual preview of the overlay card.
		var pc = document.createElement("canvas");
		pc.width = card.width; pc.height = card.height;
		pc.style.margin = "10px";
		pc.getContext("2d").putImageData(card, 0, 0);
		document.body.insertBefore(pc, document.getElementById("results"));

		// Sub-step -> parent cascade: only when the sub-bullets plausibly ARE
		// the step. A lone sub is a side note (item prep), and a parent with
		// its own chat options still has its own conversation to do.
		var casc = window.__rs3qh.subCascadeAllowed;
		check("cascade: single sub never completes parent",
			!casc({ text: "Talk to Mizgog.", chat: "1 Can I help you? / Accept", subs: [{ text: "Make a bowl of hot water." }] }));
		check("cascade: single sub, no parent chat — still no cascade",
			!casc({ text: "Do the thing.", subs: [{ text: "Prepare an item." }] }));
		check("cascade: parent with chat never completes from subs",
			!casc({ text: "Talk to X.", chat: "1 Hi.", subs: [{ text: "a" }, { text: "b" }] }));
		check("cascade: multiple subs, no parent chat — cascade allowed",
			casc({ text: "Do all of the following:", subs: [{ text: "a" }, { text: "b" }] }));
		check("cascade: no subs — nothing to cascade", !casc({ text: "Plain step." }));

		// Assist highlight shapes: outline-only primitives (Alt1 image
		// overlays cannot blend with the game, so nothing may fill the
		// option's interior).
		var shp = window.__rs3qh.highlightShapes(20, 10, 260, 26);
		var rects = shp.filter(function (s) { return s.kind === "rect"; });
		var lines = shp.filter(function (s) { return s.kind === "line"; });
		check("highlight: 3 border rings + 2 chevron lines", rects.length === 3 && lines.length === 2);
		check("highlight: rings are concentric",
			rects[0].x < rects[1].x && rects[1].x < rects[2].x &&
			rects[0].x + rects[0].w > rects[1].x + rects[1].w &&
			rects[1].x + rects[1].w > rects[2].x + rects[2].w);
		check("highlight: bright core between dim rings",
			rects[1].color !== rects[0].color && rects[0].color === rects[2].color);
		check("highlight: nothing fills the interior — text stays visible",
			shp.every(function (s) { return s.kind !== "rect" || s.lw <= 2; }));
		check("highlight: chevron sits inside the left edge",
			lines.every(function (s) { return s.x1 >= 20 && s.x2 <= 20 + 20; }));
		// Interface-scale disclaimer: shown only when nothing has EVER been
		// recognised (chatbox never found after enough scans, no dialogue).
		var hint = window.__rs3qh.scaleHintText;
		check("scale hint: appears after sustained misses", /interface\s*scale/.test(hint(8, false, false)));
		check("scale hint: silent while still warming up", hint(3, false, false) === "");
		check("scale hint: silent when chatbox was found", hint(20, true, false) === "");
		check("scale hint: silent when a dialogue was read", hint(20, false, true) === "");

		// Button measurement: the highlight hugs the real dark button bar
		// found in a crop around the OCR'd row, glyph holes and a
		// neighbouring button at the crop edge notwithstanding.
		function mockCrop(w, h, bars) {
			var d = new Uint8ClampedArray(w * h * 4);
			for (var i = 0; i < w * h; i++) { d[i * 4] = 200; d[i * 4 + 1] = 190; d[i * 4 + 2] = 170; d[i * 4 + 3] = 255; }
			(bars || []).forEach(function (b) {
				for (var y = b.y; y < b.y + b.h; y++) {
					for (var x = b.x; x < b.x + b.w; x++) {
						var j = (y * w + x) * 4;
						// Light "glyph" pixels poke holes mid-button.
						var glyph = y > b.y + 5 && y < b.y + b.h - 5 && ((x - b.x) % 9) < 2 && x > b.x + 30 && x < b.x + b.w - 30;
						d[j] = glyph ? 235 : 40; d[j + 1] = glyph ? 230 : 38; d[j + 2] = glyph ? 215 : 35;
					}
				}
			});
			return { width: w, height: h, data: d };
		}
		var meas = window.__rs3qh.measureOptionButton;
		var m1 = meas(mockCrop(480, 28, [{ x: 45, y: 4, w: 390, h: 20 }]));
		check("button measure: horizontal extent", m1 && Math.abs(m1.x - 45) <= 3 && Math.abs(m1.w - 390) <= 6);
		check("button measure: vertical extent", m1 && Math.abs(m1.y - 4) <= 2 && Math.abs(m1.h - 20) <= 4);
		check("button measure: plain parchment gives null", meas(mockCrop(480, 28, [])) === null);
		var m2 = meas(mockCrop(480, 28, [{ x: 45, y: 4, w: 390, h: 20 }, { x: 45, y: 27, w: 390, h: 1 }]));
		check("button measure: neighbour at crop edge not swallowed", m2 && m2.y + m2.h <= 25);

		// Visual preview: the shapes stroked over a mock dialogue option row.
		var prev = document.createElement("canvas");
		prev.width = 300; prev.height = 46;
		prev.style.margin = "10px";
		var pg = prev.getContext("2d");
		pg.fillStyle = "#c7b9a1"; pg.fillRect(0, 0, 300, 46);
		pg.fillStyle = "#3f2d20"; pg.font = "14px monospace";
		pg.fillText("1. Yes, I will help you.", 44, 27);
		function cssCol(c) {
			return "rgb(" + ((c >> 16) & 255) + "," + ((c >> 8) & 255) + "," + (c & 255) + ")";
		}
		shp.forEach(function (s) {
			pg.lineWidth = s.lw;
			pg.strokeStyle = cssCol(s.color);
			if (s.kind === "rect") pg.strokeRect(s.x, s.y, s.w, s.h);
			else {
				pg.lineCap = "round";
				pg.beginPath(); pg.moveTo(s.x1, s.y1); pg.lineTo(s.x2, s.y2); pg.stroke();
			}
		});
		document.body.insertBefore(prev, document.getElementById("results"));

		// Wiki links preserved through parsing for clickable names.
		var g4 = window.__rs3qh.parseQuickGuide(
			"==S==\n{{Checklist|\n* Talk to [[Dororan]] near [[Barbarian Village|the village]]. {{Chat options|1 Hi.}}\n** Then see [[Gudrun]].\n}}\n"
		);
		var ls = g4.sections[0].steps[0];
		check("links: text stays readable", ls.text === "Talk to Dororan near the village.");
		check("links: pages captured", ls.links.length === 2 && ls.links[0].page === "Dororan" && ls.links[1].page === "Barbarian Village");
		check("links: piped label kept", ls.links[1].label === "the village");
		check("links: chat unaffected", ls.chat === "1 Hi.");
		check("links: sub-step links", ls.sub[0].links.length === 1 && ls.sub[0].links[0].page === "Gudrun");

		// Quest details (main page) requirements extraction.
		var qd = window.__rs3qh.parseQuestDetails(
			"{{Infobox Quest|name=X}}\n{{Quest details\n|start = Talk to [[Bob]]\n|items = \n* 3 [[cadava berries]]\n* [[Rope]] (obtainable during the quest from [[Ned]])\n|recommended = \n* [[Lumbridge lodestone]] activated\n|kills = None\n}}\nRest of page."
		);
		check("details: items extracted", qd.items.length === 2 && qd.items[0] === "3 cadava berries");
		check("details: obtainable annotation kept", qd.items[1] === "Rope (obtainable during the quest from Ned)");
		check("details: recommended extracted", qd.recommended.length === 1 && qd.recommended[0].indexOf("lodestone") !== -1);
		check("details: absent template -> empty", window.__rs3qh.parseQuestDetails("no template here").items.length === 0);

		// Parser smoke test on a synthetic quick guide.
		var g = window.__rs3qh.parseQuickGuide(
			"==Overview==\n{{Quest details page|X}}\n" +
			"==Doing things==\n{{Needed|a [[hammer]], 2 [[nail]]s}}\n" +
			"{{Checklist|\n* Talk to [[Bob]]. {{Chat options|1 Hello.|Any}}\n* Go north.\n** Climb the ladder.\n}}\n" +
			"==Rewards==\n{{Quest rewards page|X}}\n"
		);
		check("parser: one section", g.sections.length === 1);
		check("parser: needed items", g.sections[0].needed[0] === "a hammer, 2 nails");
		check("parser: two steps", g.sections[0].steps.length === 2);
		check("parser: chat extracted", g.sections[0].steps[0].chat === "1 Hello. / Any");
		check("parser: sub step", g.sections[0].steps[1].sub.length === 1);
		check("parser: item names from Needed links",
			g.sections[0].items && g.sections[0].items.length === 2 &&
			g.sections[0].items[0].name === "hammer" && g.sections[0].items[1].name === "nail");
		check("parser: quantity before link", g.sections[0].items[1].qty === 2);
		check("parser: no quantity defaults to 1", g.sections[0].items[0].qty === 1);

		// Piped/anchored links, quantities in labels, dose notation.
		var g2 = window.__rs3qh.parseQuickGuide(
			"==S==\n{{Needed|3 [[Cadava berries]], 10 [[fishing bait]], [[antipoison#(3)|antipoison (3)]], [[Bolt of cloth|6 bolts of cloth]], [[Red dye]]}}\n{{Checklist|\n* Do it.\n}}\n"
		);
		var byName = {};
		g2.sections[0].items.forEach(function (it) { byName[it.name] = it.qty; });
		check("parser: qty 3 cadava", byName["Cadava berries"] === 3);
		check("parser: qty 10 bait", byName["fishing bait"] === 10);
		check("parser: dose anchor becomes dosed name, qty 1", byName["antipoison (3)"] === 1);
		check("parser: qty from piped label", byName["Bolt of cloth"] === 6);
		check("parser: needed text readable",
			g2.sections[0].needed[0].indexOf("6 bolts of cloth") !== -1);

		// Guide images: section-level (before steps) and step-level.
		var g3 = window.__rs3qh.parseQuickGuide(
			"==Aggie==\n" +
			"[[File:Pattern triangles.png|thumb|right|One possible solution for [[Aggie]]'s puzzle]]\n" +
			"{{Checklist|\n* Talk to [[Aggie]] in Draynor Village.\n* Solve it. [[File:Other.png|thumb|120px|Step pic]]\n}}\n"
		);
		var s3 = g3.sections[0];
		check("parser: section image captured", s3.images.length === 1 && s3.images[0].file === "Pattern triangles.png");
		check("parser: image caption cleaned", s3.images[0].caption === "One possible solution for Aggie's puzzle");
		check("parser: step image captured", s3.steps[1].images.length === 1 && s3.steps[1].images[0].file === "Other.png");
		check("parser: size param not caption", s3.steps[1].images[0].caption === "Step pic");
		check("parser: image steps unaffected", s3.steps.length === 2 && s3.steps[0].text.indexOf("Talk to Aggie") === 0);

		document.getElementById("results").textContent =
			out.join("\n") + "\n\n" + (failures ? failures + " FAILED" : "ALL TESTS PASSED");
	})();
	</script>
</body>
</html>
